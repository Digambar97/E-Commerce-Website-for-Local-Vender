<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome | LeLo Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-600 to-purple-700 flex items-center justify-center">

<div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-xl text-center">

    <h1 class="text-4xl font-extrabold text-gray-800 mb-3">
        Welcome to <span class="text-indigo-600">E-Comm</span>
    </h1>

    <p class="text-gray-600 mb-10">
        Choose how you want to continue
    </p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- CUSTOMER CARD -->
        <a href="/customer"
           class="border-2 border-indigo-600 rounded-xl p-6
                  hover:bg-indigo-600 hover:text-white transition duration-300">
            <h2 class="text-2xl font-bold mb-2">Customer</h2>
            <p class="text-sm">
                New user registration or existing login
            </p>
        </a>

        <!-- ADMIN CARD -->
        <a href="/login?role=ADMIN"
           class="border-2 border-gray-800 rounded-xl p-6
                  hover:bg-gray-800 hover:text-white transition duration-300">
            <h2 class="text-2xl font-bold mb-2">Admin</h2>
            <p class="text-sm">
                Admin access only
            </p>
        </a>

    </div>

</div>

</body>
</html>
