<!DOCTYPE html>
<html>
<head>
    <title>Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<div class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Products</h1>
    <a href="/cart" class="bg-indigo-600 text-white px-6 py-2 rounded shadow hover:bg-indigo-700 transition">
        View Cart 🛒
    </a>
</div>

<div id="products" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>

<script>
    fetch("/api/products", { credentials: "include" })
    .then(r => {
      if (r.status === 401) location.href="/login";
      return r.json();
    })
    .then(data => {
      let html = "";
      data.forEach(p => {
        html += `
          <div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">
            <h2 class="text-xl font-bold mb-2">${p.name}</h2>
            <p class="text-gray-600 mb-4">₹${p.price}</p>
            <button onclick="add(${p.id})"
              class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">
              Add to Cart
            </button>
          </div>`;
      });
      document.getElementById("products").innerHTML = html;
    });

    function add(id) {
      fetch("/api/cart/add/" + id, {
        method: "POST",
        credentials: "include"
      })
      .then(response => {
          if (response.ok) {
              alert("Item added to cart!");
          } else {
              alert("Failed to add item.");
          }
      });
    }
</script>
</body>
</html>
